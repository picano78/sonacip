{% extends "base.html" %}

{% block title %}Add Expense - SONACIP{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1><i class="fas fa-plus"></i> Add Expense</h1>
    
    <div class="row mt-4">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label for="amount">Amount (€)</label>
                            <input type="number" step="0.01" class="form-control" id="amount" name="amount" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select class="form-control" id="category" name="category" required>
                                <option value="">Select Category</option>
                                <option value="travel">Travel</option>
                                <option value="equipment">Equipment</option>
                                <option value="facility">Facility</option>
                                <option value="marketing">Marketing</option>
                                <option value="staff">Staff</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="vendor_name">Vendor Name</label>
                            <input type="text" class="form-control" id="vendor_name" name="vendor_name">
                        </div>
                        
                        <div class="form-group">
                            <label for="expense_date">Expense Date</label>
                            <input type="date" class="form-control" id="expense_date" name="expense_date" required>
                        </div>
                        
                        {% if current_user.role == 'super_admin' and societies %}
                        <div class="form-group">
                            <label for="society_id">Society (Optional)</label>
                            <select class="form-control" id="society_id" name="society_id">
                                <option value="">Select Society</option>
                                {% for society in societies %}
                                <option value="{{ society.id }}">{{ society.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endif %}
                        
                        <button type="submit" class="btn btn-primary">Submit Expense</button>
                        <a href="{{ url_for('accounting.expenses') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
