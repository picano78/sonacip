{% extends 'base.html' %}
{% block title %}Enterprise SSO{% endblock %}
{% block content %}
<div class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Enterprise SSO (OIDC)</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('admin.dashboard') }}">Admin</a>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post">
        {{ csrf_token() }}
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" name="enabled" id="enabled" {% if sso.enabled %}checked{% endif %}>
          <label class="form-check-label" for="enabled">Abilita SSO</label>
        </div>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Issuer URL</label>
            <input class="form-control" name="issuer_url" value="{{ sso.issuer_url or '' }}" placeholder="https://accounts.google.com">
            <div class="text-muted small">Deve supportare OIDC discovery: `/.well-known/openid-configuration`.</div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Client ID</label>
            <input class="form-control" name="client_id" value="{{ sso.client_id or '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Client Secret</label>
            <input class="form-control" name="client_secret" value="{{ sso.client_secret or '' }}">
          </div>
          <div class="col-12">
            <label class="form-label">Scopes</label>
            <input class="form-control" name="scopes" value="{{ sso.scopes or 'openid email profile' }}">
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" type="submit">Salva</button>
          <a class="btn btn-outline-primary" href="{{ url_for('auth.sso_login') }}">Test login SSO</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
