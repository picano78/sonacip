{% extends 'base.html' %}
{% block title %}Platform Fees{% endblock %}
{% block content %}
<div class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Take-rate piattaforma</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('admin.dashboard') }}">Admin</a>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post">
        {{ csrf_token() }}
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Percentuale (%)</label>
            <input class="form-control" name="take_rate_percent" value="{{ settings.take_rate_percent or 0 }}">
          </div>
          <div class="col-md-4">
            <label class="form-label">Min fee (cents)</label>
            <input class="form-control" name="min_fee_cents" value="{{ settings.min_fee_cents or 0 }}">
          </div>
          <div class="col-md-4">
            <label class="form-label">Valuta</label>
            <input class="form-control" name="currency" value="{{ settings.currency or 'EUR' }}">
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" type="submit">Salva</button>
          <a class="btn btn-outline-primary" href="{{ url_for('admin.platform_transactions') }}">Ledger</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
