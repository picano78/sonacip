{% extends "base.html" %}
{% block title %}Modifica Regola - SONACIP{% endblock %}

{% block extra_css %}
<style>
  .page-header {
    background: linear-gradient(135deg, #1877f2 0%, #42a5f5 100%);
    color: white; padding: 2rem; border-radius: 14px; margin-bottom: 24px;
  }
  .page-header h1 { margin: 0; font-weight: 700; }
  .form-card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
</style>
{% endblock %}

{% block content %}
<div class="container my-4">
  <div class="page-header">
    <h1><i class="bi bi-pencil-square me-2"></i>Modifica Regola</h1>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="form-card card p-4">
        <form method="POST" action="{{ url_for('automation_builder.save_rule') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <input type="hidden" name="id" value="{{ rule.id }}">

          <div class="mb-3">
            <label for="name" class="form-label fw-semibold">Nome regola *</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ rule.name }}" required>
          </div>
          <div class="mb-3">
            <label for="event_type" class="form-label fw-semibold">Tipo evento *</label>
            <select class="form-select" id="event_type" name="event_type" required>
              <option value="">— Seleziona —</option>
              {% for val, label in [('user_registered','Registrazione utente'),('payment_received','Pagamento ricevuto'),('event_created','Evento creato'),('task_completed','Task completato'),('message_sent','Messaggio inviato')] %}
              <option value="{{ val }}" {{ 'selected' if rule.event_type == val }}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label for="condition" class="form-label fw-semibold">Condizione (JSON)</label>
            <textarea class="form-control font-monospace" id="condition" name="condition" rows="3">{{ rule.condition or '' }}</textarea>
          </div>
          <div class="mb-3">
            <label for="actions" class="form-label fw-semibold">Azioni (JSON) *</label>
            <textarea class="form-control font-monospace" id="actions" name="actions" rows="3" required>{{ rule.actions or '' }}</textarea>
          </div>
          <div class="mb-3 form-check form-switch">
            <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {{ 'checked' if rule.is_active }}>
            <label class="form-check-label fw-semibold" for="is_active">Regola attiva</label>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <a href="{{ url_for('automation_builder.index') }}" class="btn btn-outline-secondary">Annulla</a>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salva Modifiche</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
