<div class="d-flex mb-3">
    {% if comment.author.avatar %}
        <img src="{{ url_for('static', filename='uploads/' + comment.author.avatar) }}" 
             class="rounded-circle me-2" width="40" height="40">
    {% else %}
        <div class="bg-secondary text-white rounded-circle me-2 d-flex align-items-center justify-content-center" 
             style="width: 40px; height: 40px; min-width: 40px;">
            <i class="bi bi-person-fill"></i>
        </div>
    {% endif %}
    <div class="flex-grow-1">
        <div class="bg-light p-2 rounded">
            <strong>{{ comment.author.get_full_name() }}</strong>
            <p class="mb-0">{{ comment.content }}</p>
        </div>
        <small class="text-muted">{{ comment.created_at|timeago }}</small>
    </div>
</div>
