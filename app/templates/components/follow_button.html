{% if user.id != current_user.id %}
    {% set is_following = current_user.is_following(user) %}
    {# Determine button style based on context #}
    {% if context == 'profile' %}
        <button class="btn-prof-primary"
                hx-post="{{ url_for('social.unfollow' if is_following else 'social.follow', user_id=user.id) }}"
                hx-swap="outerHTML"
                hx-target="this">
            {% if is_following %}<i class="bi bi-check-lg"></i> Seguendo{% else %}<i class="bi bi-plus-lg"></i> Segui{% endif %}
        </button>
    {% elif context == 'search' %}
        <button class="btn btn-sm btn-follow-search {{ 'following' if is_following }}"
                hx-post="{{ url_for('social.unfollow' if is_following else 'social.follow', user_id=user.id) }}"
                hx-swap="outerHTML"
                hx-target="this">
            {{ 'Smetti di seguire' if is_following else 'Segui' }}
        </button>
    {% elif context == 'explore' %}
        <button class="btn btn-sm btn-follow"
                hx-post="{{ url_for('social.unfollow' if is_following else 'social.follow', user_id=user.id) }}"
                hx-swap="outerHTML"
                hx-target="this">
            {{ 'Seguendo' if is_following else 'Segui' }}
        </button>
    {% else %}
        <button class="btn btn-sm {{ 'btn-outline-primary' if is_following else 'btn-primary' }}"
                hx-post="{{ url_for('social.unfollow' if is_following else 'social.follow', user_id=user.id) }}"
                hx-swap="outerHTML"
                hx-target="this">
            {% if is_following %}
                <i class="bi bi-person-check-fill"></i> Smetti di seguire
            {% else %}
                <i class="bi bi-person-plus-fill"></i> Segui
            {% endif %}
        </button>
    {% endif %}
{% endif %}
