{% extends "base.html" %}
{% block title %}{{ stream.title }} - Diretta - SONACIP{% endblock %}

{% block extra_css %}
<style>
    body {
        background: #000;
        color: #fff;
    }
    
    .broadcast-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }
    
    .video-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background: #000;
    }
    
    #localVideo {
        width: 100%;
        max-width: 100%;
        height: auto;
        max-height: 80vh;
        object-fit: contain;
        border-radius: 8px;
    }
    
    .controls-overlay {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 15px;
        background: rgba(0,0,0,0.8);
        padding: 15px 25px;
        border-radius: 50px;
    }
    
    .control-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: none;
        background: rgba(255,255,255,0.2);
        color: #fff;
        font-size: 20px;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .control-btn:hover {
        background: rgba(255,255,255,0.3);
        transform: scale(1.1);
    }
    
    .control-btn.danger {
        background: #dc3545;
    }
    
    .control-btn.danger:hover {
        background: #c82333;
    }
    
    .stream-stats {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0,0,0,0.8);
        padding: 15px 20px;
        border-radius: 12px;
    }
    
    .stat-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
    }
    
    .stat-item:last-child {
        margin-bottom: 0;
    }
    
    .live-indicator {
        background: #dc3545;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
    }
    
    .recording-indicator {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(220, 53, 69, 0.9);
        padding: 10px 15px;
        border-radius: 8px;
        display: none;
    }
    
    .recording-indicator.active {
        display: block;
    }
    
    @media (max-width: 768px) {
        .controls-overlay {
            bottom: 10px;
            padding: 10px 15px;
            gap: 10px;
        }
        
        .control-btn {
            width: 45px;
            height: 45px;
            font-size: 18px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="broadcast-container">
    <div class="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
        
        <div class="stream-stats">
            <div class="stat-item">
                <span class="live-indicator">
                    <i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i>
                    LIVE
                </span>
            </div>
            <div class="stat-item">
                <i class="bi bi-eye-fill"></i>
                <span id="viewerCount">0</span> spettatori
            </div>
            <div class="stat-item">
                <i class="bi bi-clock-fill"></i>
                <span id="duration">00:00</span>
            </div>
        </div>
        
        <div class="recording-indicator" id="recordingIndicator">
            <i class="bi bi-record-circle me-2"></i>
            Registrazione in corso
        </div>
        
        <div class="controls-overlay">
            <button class="control-btn" id="toggleCamera" title="Attiva/Disattiva camera">
                <i class="bi bi-camera-video-fill"></i>
            </button>
            <button class="control-btn" id="toggleMic" title="Attiva/Disattiva microfono">
                <i class="bi bi-mic-fill"></i>
            </button>
            <button class="control-btn" id="switchCamera" title="Cambia camera">
                <i class="bi bi-arrow-repeat"></i>
            </button>
            <button class="control-btn" id="toggleFullscreen" title="Schermo intero">
                <i class="bi bi-fullscreen"></i>
            </button>
            <button class="control-btn danger" id="endStream" title="Termina diretta">
                <i class="bi bi-stop-circle-fill"></i>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const streamId = {{ stream.id }};
const roomId = '{{ stream.room_id }}';

let localStream = null;
let videoEnabled = true;
let audioEnabled = true;
let facingMode = 'user'; // 'user' for front camera, 'environment' for back camera
let startTime = new Date();

// Initialize camera and microphone
async function initMedia() {
    try {
        const constraints = {
            video: {
                facingMode: facingMode,
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true
            }
        };
        
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        document.getElementById('localVideo').srcObject = localStream;
        
        updateDuration();
        updateViewerCount();
        
    } catch (error) {
        console.error('Error accessing media devices:', error);
        alert('Impossibile accedere alla fotocamera o al microfono. Verifica i permessi del browser.');
    }
}

// Toggle camera on/off
document.getElementById('toggleCamera').addEventListener('click', () => {
    if (localStream) {
        videoEnabled = !videoEnabled;
        localStream.getVideoTracks().forEach(track => {
            track.enabled = videoEnabled;
        });
        
        const btn = document.getElementById('toggleCamera');
        btn.innerHTML = videoEnabled 
            ? '<i class="bi bi-camera-video-fill"></i>'
            : '<i class="bi bi-camera-video-off-fill"></i>';
        btn.style.background = videoEnabled ? 'rgba(255,255,255,0.2)' : '#dc3545';
    }
});

// Toggle microphone on/off
document.getElementById('toggleMic').addEventListener('click', () => {
    if (localStream) {
        audioEnabled = !audioEnabled;
        localStream.getAudioTracks().forEach(track => {
            track.enabled = audioEnabled;
        });
        
        const btn = document.getElementById('toggleMic');
        btn.innerHTML = audioEnabled 
            ? '<i class="bi bi-mic-fill"></i>'
            : '<i class="bi bi-mic-mute-fill"></i>';
        btn.style.background = audioEnabled ? 'rgba(255,255,255,0.2)' : '#dc3545';
    }
});

// Switch between front and back camera
document.getElementById('switchCamera').addEventListener('click', async () => {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    
    // Stop current stream
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
    
    // Restart with new camera
    await initMedia();
});

// Fullscreen toggle
document.getElementById('toggleFullscreen').addEventListener('click', () => {
    const videoContainer = document.querySelector('.video-container');
    
    if (!document.fullscreenElement) {
        videoContainer.requestFullscreen().catch(err => {
            console.error('Error attempting to enable fullscreen:', err);
        });
    } else {
        document.exitFullscreen();
    }
});

// End stream
document.getElementById('endStream').addEventListener('click', async () => {
    if (!confirm('Sei sicuro di voler terminare la diretta?')) return;
    
    try {
        const response = await fetch(`/livestream/${streamId}/stop`, {
            method: 'POST'
        });
        
        const data = await response.json();
        
        if (data.success) {
            // Stop all tracks
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            // Redirect to main page
            window.location.href = '/livestream';
        }
    } catch (error) {
        console.error('Error ending stream:', error);
        alert('Errore durante la chiusura della diretta');
    }
});

// Update viewer count periodically
async function updateViewerCount() {
    try {
        const response = await fetch(`/livestream/${streamId}/info`);
        const data = await response.json();
        document.getElementById('viewerCount').textContent = data.viewer_count;
    } catch (error) {
        console.error('Error fetching viewer count:', error);
    }
    
    setTimeout(updateViewerCount, 3000);
}

// Update duration display
function updateDuration() {
    const now = new Date();
    const diff = Math.floor((now - startTime) / 1000);
    const minutes = Math.floor(diff / 60);
    const seconds = diff % 60;
    document.getElementById('duration').textContent = 
        `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    
    setTimeout(updateDuration, 1000);
}

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
});

// Initialize on load
initMedia();
</script>
{% endblock %}
