{% extends "base.html" %}
{% block title %}Pagamento Annullato - SONACIP{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="card shadow-sm">
                <div class="card-body py-5">
                    <div class="mb-4">
                        <i class="bi bi-x-circle-fill text-warning" style="font-size: 4rem;"></i>
                    </div>
                    <h3 class="text-warning mb-3">Pagamento Annullato</h3>
                    <p class="text-muted mb-4">Il pagamento non è stato completato. Nessun addebito è stato effettuato.</p>

                    <div class="d-flex gap-2 justify-content-center">
                        {% if fee_id %}
                        <a href="{{ url_for('payments.pay', fee_id=fee_id) }}" class="btn text-white" style="background-color: #1877f2;">
                            <i class="bi bi-arrow-clockwise"></i> Riprova
                        </a>
                        {% endif %}
                        <a href="{{ url_for('payments.index') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> I Miei Pagamenti
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
