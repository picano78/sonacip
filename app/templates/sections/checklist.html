{% set c = sec.content or {} %}
<section class="section-padding section-animate" style="background: var(--surface-light, #f0f2f5);">
  <div class="container">
    <div class="row align-items-center g-4">
      <div class="col-md-6">
        {% if c.get('title') %}<h2 class="section-title" style="text-align: left;">{{ c.get('title') }}</h2>{% endif %}
        <ul style="list-style: none; padding: 0;">
          {% for item in c.get('items', []) %}
          <li style="margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: flex-start;">
            <i class="bi bi-check-circle-fill" style="color: #1877f2; font-size: 1.5rem; flex-shrink: 0; margin-top: 0.25rem;"></i>
            <div>
              <strong style="display: block; margin-bottom: 0.25rem;">{{ item.get('title', '') }}</strong>
              <span style="color: #65676b;">{{ item.get('text', '') }}</span>
            </div>
          </li>
          {% endfor %}
        </ul>
      </div>
      <div class="col-md-6">
        <div style="background: #1877f2; border-radius: 16px; padding: 3rem 2rem; color: white; text-align: center; min-height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
          <i class="bi bi-rocket-takeoff" style="font-size: 4rem; margin-bottom: 1rem; opacity: 0.9;"></i>
          <h3 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem;">Inizia Oggi</h3>
          <p style="margin-bottom: 2rem;">Non serve carta di credito. Accedi in 5 minuti.</p>
          <a href="/auth/register" class="btn-facebook" style="background: white; color: #1877f2;">
            <i class="bi bi-arrow-right"></i> Registrati Gratis
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
