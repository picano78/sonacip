{% set c = sec.content or {} %}
<section class="section-padding section-animate">
  <div class="container">
    <div class="cta-section">
      {% if c.get('title') %}<h2>{{ c.get('title') }}</h2>{% endif %}
      {% if c.get('text') %}<p>{{ c.get('text') }}</p>{% endif %}
      <div class="cta-buttons">
        {% if c.get('btn1_text') %}
        <a href="{{ c.get('btn1_url', '#') }}" class="btn-facebook">
          <i class="bi bi-arrow-right"></i> {{ c.get('btn1_text') }}
        </a>
        {% endif %}
        {% if c.get('btn2_text') %}
        <a href="{{ c.get('btn2_url', '#') }}" class="btn-facebook-outline">
          {{ c.get('btn2_text') }}
        </a>
        {% endif %}
      </div>
    </div>
  </div>
</section>
