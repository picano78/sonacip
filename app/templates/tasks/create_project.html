{% extends "base.html" %}
{% block title %}Nuovo Progetto - SONACIP{% endblock %}

{% block extra_css %}
<style>
  .page-header {
    background: linear-gradient(135deg, #1877f2 0%, #42a5f5 100%);
    color: white; padding: 2rem; border-radius: 14px; margin-bottom: 24px;
  }
  .page-header h1 { margin: 0; font-weight: 700; }
  .form-card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
</style>
{% endblock %}

{% block content %}
<div class="container my-4">
  <div class="page-header">
    <h1><i class="bi bi-folder-plus me-2"></i>Nuovo Progetto</h1>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="form-card card p-4">
        <form method="POST" action="{{ url_for('tasks.create_project') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="name" class="form-label fw-semibold">Nome *</label>
            <input type="text" class="form-control" id="name" name="name" required>
          </div>
          <div class="mb-3">
            <label for="description" class="form-label fw-semibold">Descrizione</label>
            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label for="project_type" class="form-label fw-semibold">Tipo progetto</label>
              <select class="form-select" id="project_type" name="project_type">
                <option value="generale">Generale</option>
                <option value="sportivo">Sportivo</option>
                <option value="amministrativo">Amministrativo</option>
                <option value="evento">Evento</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="color" class="form-label fw-semibold">Colore</label>
              <input type="color" class="form-control form-control-color w-100" id="color" name="color" value="#1877f2">
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label for="start_date" class="form-label fw-semibold">Data inizio</label>
              <input type="date" class="form-control" id="start_date" name="start_date">
            </div>
            <div class="col-md-6">
              <label for="end_date" class="form-label fw-semibold">Data fine</label>
              <input type="date" class="form-control" id="end_date" name="end_date">
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <a href="{{ url_for('tasks.index') }}" class="btn btn-outline-secondary">Annulla</a>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Crea Progetto</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
