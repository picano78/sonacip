{% extends "base.html" %}
{% block title %}Nuovo Task - SONACIP{% endblock %}

{% block extra_css %}
<style>
  .page-header {
    background: linear-gradient(135deg, #1877f2 0%, #42a5f5 100%);
    color: white; padding: 2rem; border-radius: 14px; margin-bottom: 24px;
  }
  .page-header h1 { margin: 0; font-weight: 700; }
  .form-card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
</style>
{% endblock %}

{% block content %}
<div class="container my-4">
  <div class="page-header">
    <h1><i class="bi bi-plus-square me-2"></i>Nuovo Task</h1>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="form-card card p-4">
        <form method="POST" action="{{ url_for('tasks.create_task') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Titolo *</label>
            <input type="text" class="form-control" id="title" name="title" required>
          </div>
          <div class="mb-3">
            <label for="description" class="form-label fw-semibold">Descrizione</label>
            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label for="status" class="form-label fw-semibold">Stato</label>
              <select class="form-select" id="status" name="status">
                <option value="todo">Da fare</option>
                <option value="in_progress">In corso</option>
                <option value="review">Revisione</option>
                <option value="done">Completato</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="priority" class="form-label fw-semibold">Priorità</label>
              <select class="form-select" id="priority" name="priority">
                <option value="bassa">Bassa</option>
                <option value="media" selected>Media</option>
                <option value="alta">Alta</option>
              </select>
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label for="start_date" class="form-label fw-semibold">Data inizio</label>
              <input type="date" class="form-control" id="start_date" name="start_date">
            </div>
            <div class="col-md-6">
              <label for="due_date" class="form-label fw-semibold">Scadenza</label>
              <input type="date" class="form-control" id="due_date" name="due_date">
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label for="project_id" class="form-label fw-semibold">Progetto</label>
              <select class="form-select" id="project_id" name="project_id">
                <option value="">— Nessun progetto —</option>
                {% for p in projects %}
                <option value="{{ p.id }}">{{ p.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label for="assigned_to" class="form-label fw-semibold">Assegnato a</label>
              <select class="form-select" id="assigned_to" name="assigned_to">
                <option value="">— Nessuno —</option>
                {% for u in users %}
                <option value="{{ u.id }}">{{ u.full_name or u.username }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label for="estimated_hours" class="form-label fw-semibold">Ore stimate</label>
              <input type="number" class="form-control" id="estimated_hours" name="estimated_hours" min="0" step="0.5">
            </div>
            <div class="col-md-6">
              <label for="tags" class="form-label fw-semibold">Tag</label>
              <input type="text" class="form-control" id="tags" name="tags" placeholder="Separati da virgola">
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <a href="{{ url_for('tasks.index') }}" class="btn btn-outline-secondary">Annulla</a>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Crea Task</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
