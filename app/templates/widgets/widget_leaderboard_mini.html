<div class="card shadow-sm border-0 h-100">
    <div class="card-header bg-white border-bottom" style="border-color: #1877f2 !important;">
        <h6 class="mb-0"><i class="bi bi-trophy-fill text-primary"></i> Classifica</h6>
    </div>
    <div class="card-body p-0">
        <div class="list-group list-group-flush">
            {% if leaders %}
                {% for leader in leaders %}
                <div class="list-group-item py-2 px-3 d-flex align-items-center">
                    <span class="badge rounded-pill me-2 {% if loop.index == 1 %}bg-warning{% elif loop.index == 2 %}bg-secondary{% elif loop.index == 3 %}bg-danger{% else %}bg-light text-dark{% endif %}">{{ loop.index }}</span>
                    <div class="flex-grow-1">
                        <small class="fw-bold">{{ leader.name }}</small>
                    </div>
                    <span class="badge bg-primary bg-opacity-10 text-primary">{{ leader.points }} pt</span>
                </div>
                {% endfor %}
            {% else %}
                <div class="text-center text-muted py-4">
                    <i class="bi bi-trophy fs-3"></i>
                    <p class="small mb-0 mt-1">Nessun dato disponibile</p>
                </div>
            {% endif %}
        </div>
    </div>
</div>
