server {
    listen 80;
    server_name tuodominio.it www.tuodominio.it;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tuodominio.it www.tuodominio.it;

    # SSL (Certbot/Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/tuodominio.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuodominio.it/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # File statici serviti direttamente da Nginx
    location /static/ {
        alias /opt/sonacip/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # File caricati dagli utenti
    location /uploads/ {
        alias /opt/sonacip/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy verso gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
